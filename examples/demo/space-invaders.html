<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Invaders — TeEngine</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      #back {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 2;
        color: #c9d1d9;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        text-decoration: none;
        padding: 6px 12px;
        background: rgba(13, 17, 23, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      #back:hover {
        background: rgba(27, 40, 56, 0.9);
        color: #66c0f4;
      }

      #hud {
        position: fixed;
        top: 12px;
        right: 16px;
        color: #c9d1d9;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 14px;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        z-index: 1;
      }

      #fallback {
        display: none;
        color: #f0f6fc;
        font-family: system-ui, sans-serif;
        padding: 2rem;
        max-width: 40rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <a id="back" href="index.html">← Store</a>
    <div id="hud">Loading…</div>
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="fallback">
      <h1>WebGPU not available</h1>
      <p>
        TeEngine requires a browser with WebGPU support (Chrome 113+, Edge 113+,
        or Firefox Nightly with the flag enabled).
      </p>
    </div>
    <script type="module" src="/src/space-invaders/main.ts"></script>
  </body>
</html>
